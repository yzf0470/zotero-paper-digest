zotero:
  library_type: user
  library_id: ""
  collection_keys: []
  max_seeds: 30

discovery:
  recent_days: 365
  max_candidates_per_source: 50
  sources: [openalex, crossref]

ranking:
  shortlist_size: 20
  llm_enabled: false
  llm_max_items: 20
  prefer_new: true
  min_new_results_before_classics: 3
  target_new_results: 7
  target_classic_results: 3
  required_domain_terms:
    - Open source cache
    - FPGA cache
    - Automated pragma insertion
    - Automated Code Transformation 
    - HLS
    - High-level synthesis
    - Design Space Exploration


classics:
  min_age_years: 2
  max_age_years: 8

email:
  from_email: ""
  to_email: ""
  smtp_host: ""
  smtp_port: 587

output:
  save_json: true
  save_html: true
